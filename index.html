<!DOCTYPE html>
<html>
    <title>PureRandom Studios</title>
    <link rel="icon" type=image/x-icon href="./icon">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>

        body {
            margin:0;
            background-color: #E1E2E2;
            color: #1D2228;
        }
        
        /* Nav Bar*/
        .navbar {
          overflow: hidden;
          background-color: #1D2228;
          position: fixed;
          z-index: 999;
          top: 0;
          width: 100%;
        }
        
        .navbar a {
          float: right;
          display: block;
          color: #f2f2f2;
          background-color: #FB8122;
          transition: all 0.3s ease;
          text-align: center;
          text-decoration: none;
          padding: 14px 20px;
          font-family: Arial;
          font-size: 17px;
        }
        
        .navbar a:hover {
          background: #3a4450;
          color: black;
        }

        .active {
          background-color: #E1E2E2;
        }
        /* Nav Bar End*/

        .title {
            background-color: rgb(0, 183, 255);
            margin-top: 50px;
        }

        .main {
          padding: 16px;
          margin-top: 30px;
          height: 1500px; /* Used in this example to enable scrolling */
          font-family: cursive;
        }

        .hero-image {
          background: url(https://i.imgur.com/xE2QxCWh.jpg) no-repeat center; 
          background-size: cover;
          margin-top: 30px;
          height: 500px;
          position: relative;
        }

        .hero-text {
          text-align: center;
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          margin-top: 30px;
          font-family: Arial;
          color: #E1E2E2;
        }


        </style>

        <body>
            <div class="navbar">
                <a class="active" href="#"><i class="fa fa-home"></i></a> 
                <a href="#"><i class="fa fa-search"></i></a> 
                <a href="#"><i class="fa fa-envelope"></i></a> 
                <a href="#"><i class="fa fa-globe"></i></a>
                <a href="#"><i class="fa fa-trash"></i></a> 
              </div>

            <div class="hero-image">
                <div class="hero-text">
                  <h1 style="font-size:50px">PureRandom Studios</h1>
                </div>
            </div>

            <h1 style="margin-left: 10%;">Hello</h1>
        </body>

        

</html>

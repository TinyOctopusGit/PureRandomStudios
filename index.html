<!DOCTYPE html>

    <style>

        body {
            margin:0;
            background-color: #E1E2E2;
            color: #1D2228;
        }

        h1 {
          margin-top: 50%;
        }

        * {box-sizing: border-box;}
        body {font-family: Verdana, sans-serif;}
        .mySlides {display: none;}
        img {vertical-align: middle;}

      /* Slideshow container */
      .slideshow-container {
        max-width: 2000px;
        position: relative;
        margin: auto;
      }

      /* Caption text */
      .text {
        color: #f2f2f2;
        font-size: 50px;
        padding: 8px 12px;
        position: absolute;
        top: 50%;
        width: 100%;
        text-align: center;
      }

      /* Number text (1/3 etc) */
      .numbertext {
        color: #f2f2f2;
        font-size: 12px;
        padding: 8px 12px;
        position: absolute;
        top: 0;
      }

      /* The dots/bullets/indicators */
    .dot {
          z-index: 1;
          height: 15px;
          width: 15px;
          margin: 0 2px;
          background-color: #bbb;
          border-radius: 50%;
          transition: background-color 0.6s ease;
        }

        .active {
         background-color: #717171;
        }

        /* Fading animation */
        .slide {
          animation-name: slidein;
          animation-duration: 1.5s;
          animation-name: slideout;
        }

        @keyframes slide-in {
          from {transform: translateX(-100%);} 
          to {transform: translateX(0%);}
        }
        @keyframes slide-out {
          from {transform: translateX(0%);} 
          to {transform: translateX(100%);}
        }

        /* On smaller screens, decrease text size */
        @media only screen and (max-width: 400px) {
          .text {font-size: 25px;
            top: 50%;
          }
          .navbar a{size: auto;}
          .rectangle{height: 50%;}
        }
        
        /* Nav Bar*/
        .navbar {
          overflow: hidden;
          background-color: #1D2228;
          position: fixed;
          z-index: 999;
          top: 0;
          width: 100%;
        }
        
        .navbar a {
          float: right;
          display: block;
          color: #f2f2f2;
          background-color: #FB8122;
          transition: all 0.3s ease;
          text-align: center;
          text-decoration: none;
          padding: 14px 20px;
          font-family: Arial;
          font-size: 17px;
        }
        
        .navbar a:hover {
          background: #E1E2E2;
          color: black;
        }

        .active {
          background-color: #E1E2E2;
        }
        /* Nav Bar End*/

        .title {
            background-color: rgb(0, 183, 255);
            margin-top: 50px;
        }

        .main {
          padding: 16px;
		      margin-left: 10%;
		      margin-right: 10%;
          height: 1500px; /* Used in this example to enable scrolling */
          font-family: Arial;
        }

    </style>

    <body>

			<div class="main">
            <h2>Hello</h2>
			<p style="font-size: 120%;">Welcome to PureRandom Studios, a website created by me with HTML to desplay all my creations made in blender, Unreal Engine, and a few other softwares.</p>
			</div>

      <script>
        var slideIndex = 0;
        showSlides();
        
        function showSlides() {
          var i;
          var slides = document.getElementsByClassName("mySlides");
          var dots = document.getElementsByClassName("dot");
          for (i = 0; i < slides.length; i++) {
          slides[i].style.display = "none";  
          }
          slideIndex++;
          if (slideIndex > slides.length) {slideIndex = 1}    
          for (i = 0; i < dots.length; i++) {
          dots[i].className = dots[i].className.replace(" active", "");
          }
          slides[slideIndex-1].style.display = "block";  
          dots[slideIndex-1].className += " active";
          setTimeout(showSlides, 4000); // Change image every 4 seconds
        }
        </script>
